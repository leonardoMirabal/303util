name: Release build

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - README.md
      - docs/**

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: keepbang/bump-tag-version@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: minor
          INITIAL_VERSION: 0.1.0
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_BRANCHES: main,dev
          PRERELEASE: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          PRERELEASE_SUFFIX: alpha
          GIT_API_TAGGING: true
          BRANCH_HISTORY: compare

  build:
    needs: get-version
    runs-on: ubuntu-latest
    env:
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_DESKTOP_CLIENT_ID: ${{ secrets.VITE_GOOGLE_DESKTOP_CLIENT_ID }}
      RELEASE_VERSION: ${{ needs.get-version.outputs.version }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "ndk;29.0.13846066"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install npm dependencies
        run: npm ci

      - name: Make release script executable
        run: chmod +x ./build-release-artifacts.sh

      - name: Build release artifacts
        run: ./build-release-artifacts.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Upload Pages artifact
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/web

  release:
    needs:
      - get-version
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.get-version.outputs.version }}
          name: ${{ needs.get-version.outputs.version }}
          prerelease: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          artifacts: |
            artifacts/web-bundle.zip
            artifacts/apk/*.apk

  deploy-pages:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
